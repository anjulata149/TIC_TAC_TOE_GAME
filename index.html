<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made by EKLAVYA</title>

</head>
<style>
    * {
    padding: 0;
    margin: 0;
}

.body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    background-color: #CFD186;
}

.back-cover {
    width: 501px;
    height: 501px;
    margin: 0px;
    padding: 0px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0px;
    color: black;
    font-size: 5rem;
    font-weight: 900;
}

h1 {
    font-weight: 900;
    height: 80px;
    font-size: 70px;
}

button {
    height: 167px;
    width: 167px;
    padding: 0px;
    margin: 0px;
    border: none;
    background-color: #CFD186;
    font-size: 7rem;
    color: #52414C;
}

#box-0 {
    border-right: 4px solid green;
    border-bottom: 4px solid green;
}

#box-1 {
    border-right: 4px solid green;
    border-left: 4px solid green;
    border-bottom: 4px solid green;
}

#box-2 {
    border-left: 4px solid green;
    border-bottom: 4px solid green;
}

#box-3 {
    border-right: 4px solid green;
    border-bottom: 4px solid green;
    border-top: 4px solid green;
}

#box-4 {
    border: 4px solid green;
}

#box-5 {
    border-bottom: 4px solid green;
    border-top: 4px solid green;
    border-left: 4px solid green;
}

#box-6 {
    border-top: 4px solid green;
    border-right: 4px solid green;
}

#box-7 {
    border-right: 4px solid green;
    border-top: 4px solid green;
    border-left: 4px solid green;
}

#box-8 {
    border-top: 4px solid green;
    border-left: 4px solid green
}

#reset-btn {
    font-size: 2rem;
    background-color: #52414C;
    color: white;
    border: none;
    border-radius: 5px;
    height: 60px;
    width: 200px;
    margin: 40px;
}
button:active {
    background-color: #CFD186;
}

button:hover {
    background-color: #E3655B;
}

#reset-btn:hover {
    background-color: #596157;
}

#reset-btn:active {
    background-color: #52414C;
}

.animation {
    animation: animation 200ms forwards;
}

@keyframes animation {
    0% {
        background-color: #CFD186;
    }
    50% {
        border-radius: 50%;
        height: 167px;
        width: 167px;
    }
    100% {
        background-color: #CFD186;
    }
}

#draw {
    height: 200px;
    width: 80vw;
    border: #596157 15px solid;
    border-radius: 15px;
    text-shadow: 0 20px 10px #a34841;
    background-color: #d9dd60;
    color: #52414C;
    font-family: algerian, Helvetica, sans-serif;
    padding-top: 20px;
    font-size: 60px;
    text-align: center;
    align-items: center;
    position: fixed;
    top: 300px;
    display: flex;
    flex-direction: column;
}

.hidden {
    visibility: hidden;
}

.newGamebtn {
    font-size: 2rem;
    padding: 5px;
    background-color: #52414C;
    color: white;
    border: none;
    border-radius: 5px;
    height: 60px;
    width: 200px;
    margin: 40px;

}

.newGamebtn:active {
    background-color: #52414C;
}

@media (max-width:525px) {
    button {
        height: 83.5px;
        width: 83.5px;
        font-size: 4.8rem;
    }
    h1 {
        font-weight: 900;
        height: 80px;
        font-size: 30px;
    }
    #reset-btn {
        font-size: 1.8rem;
        background-color: #52414C;
        color: white;
        border: none;
        border-radius: 5px;
        height: 40px;
        width: 200px;
        margin: 40px;
    }
    .back-cover {
        width: 250.5px;
        height: 250.5px;
    }
} 
</style>
    
<body class="body">
    <h1 >TICK-TAC-TOE</h1><br>
    <div class="back-cover">
        <button class="box" id="box-0" ></button>
        <button class="box" id="box-1" ></button>
        <button class="box" id="box-2" ></button>
        <button class="box" id="box-3" ></button>
        <button class="box" id="box-4" ></button>
        <button class="box" id="box-5" ></button>
        <button class="box" id="box-6" ></button>
        <button class="box" id="box-7" ></button>
        <button class="box" id="box-8" ></button>

        
    </div>
    <div>
        <button id="reset-btn">RESET</button>
    </div>
    <div class="message hidden" id="draw" >
        DRAW
        <button class="newGamebtn">New Game</button>
    </div>

    
<script>
    let buttons = document.querySelectorAll(".box");
let resetBtn = document.querySelector("#reset-btn");
let body = document.querySelector("body")
const winPatterns = [
    [0, 1, 2],
    [0, 3, 6],
    [0, 4, 8],
    [1, 4, 7],
    [2, 5, 8],
    [2, 4, 6],
    [3, 4, 5],
    [6, 7, 8],
];


let turnx = true;
let moves = 0;
let draw = document.querySelector("#draw");
let newGamebtn = document.querySelector(".newGamebtn")

buttons.forEach((box) => {
    box.addEventListener("click", () => {
        moves += 1;
        if (moves !== 9) {
            if (turnx) {
                box.innerText = "X";
                turnx = false;

            }
            else {
                box.innerText = "O";
                turnx = true;
            }
        }
        else {
            draw.classList.toggle("hidden");
        }

        box.disabled = true;
        console.log(moves)

        checkWinner();
    });
});
newGamebtn.addEventListener("click", () => {
    buttons.forEach((box) => {
        moves=0;
        box.innerText = "";
        box.disabled = false;
        draw.classList.toggle("hidden");
    })
})
checkWinner = () => {
    for (pattern of winPatterns) {
        if (buttons[pattern[0]].innerText === "X" && buttons[pattern[1]].innerText === "X" && buttons[pattern[2]].innerText === "X") {
            alert("CNGRATULATIONS, Player-X Wins !!!, Tap Reset");
            moves=0;
            buttons.forEach((box) => {
                box.innerText = "";
                box.disabled = true;
            });
            break
        } if (buttons[pattern[0]].innerText === "O" && buttons[pattern[1]].innerText === "O" && buttons[pattern[2]].innerText === "O") {
            moves=0;
            alert("CNGRATULATIONS, Player-O Wins !!!, Tap Reset");
            buttons.forEach((box) => {
                box.innerText = "";
                box.disabled = true;
            });
            break
        }

    }
}

resetBtn.addEventListener("click", () => {
    buttons.forEach((box) => {
        box.innerText = "";
        box.disabled = false;
    });
});

let allButton = document.querySelectorAll(".box")
resetBtn.addEventListener("click", () => {
    allButton.forEach((but) => {
        but.classList.remove("animation");
        void but.offsetWidth;
        but.classList.add("animation");
    });

});


        
</script>
</body>

</html>
